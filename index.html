<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Vœux d'Anniversaire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #f5f1e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1f2937;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input[type="text"],
        .form-group input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: #1f2937;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="date"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .variants-section {
            margin-bottom: 25px;
        }

        .variants-title {
            color: #1f2937;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .variants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .variant-option {
            display: flex;
            align-items: center;
        }

        .variant-option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .variant-option input[type="radio"]:checked {
            background: #3b82f6;
            box-shadow: inset 0 0 0 3px white;
        }

        .variant-option label {
            margin: 0;
            cursor: pointer;
            font-size: 0.95rem;
            color: #374151;
            font-weight: 500;
            user-select: none;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .wishes-card {
            background: linear-gradient(135deg, #3b82f6 0%, #8b6f47 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            color: white;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .wishes-card.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wishes-card h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .wishes-message {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.8;
            min-height: 120px;
            display: flex;
            align-items: center;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 14px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp:active {
            transform: translateY(0);
        }

        .btn-whatsapp svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .form-card {
                padding: 30px 20px;
            }

            .wishes-card {
                padding: 30px 20px;
            }

            .wishes-message {
                font-size: 1rem;
            }
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer .developer {
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer .developer svg {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .form-card {
                padding: 20px 15px;
            }

            .wishes-card {
                padding: 20px 15px;
            }

            body {
                padding: 10px;
            }

            .footer {
                margin-top: 30px;
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

                        <input type="radio" id="romantic" name="variant" value="romantic" checked>

                    </div>
                    <div class="variant-option">
                        <input type="radio" id="friendly" name="variant" value="friendly">

                    </div>
                    <div class="variant-option">
                        <input type="radio" id="inspirational" name="variant" value="inspirational">

                    </div>
                    <div class="variant-option">
                        <input type="radio" id="humorous" name="variant" value="humorous">
                        <label for="humorous">😄 Rigolo</label>
                    </div>
                    <div class="variant-option">
                        <input type="radio" id="family" name="variant" value="family">

                    </div>
                    <div class="variant-option">
                        <input type="radio" id="adventurous" name="variant" value="adventurous">

                    </div>
                </div>
            </div>

            <button class="btn-generate" onclick="generateWishes()">
                Générer les Vœux ✨
            </button>
        </div>

        <div class="wishes-card" id="wishesCard">
            <h2>Vœux Personnalisés 🎉</h2>
            <div class="wishes-message" id="wishesMessage"></div>

                </svg>
                Envoyer via WhatsApp
            </button>
        </div>

        <div class="footer">
            <p>Générateur de Vœux d'Anniversaire</p>
            <p class="developer">

    </div>

        function generateWishes() {
            const nameInput = document.getElementById('name');
            const dateInput = document.getElementById('birthDate');
            const errorMessage = document.getElementById('errorMessage');
            const wishesCard = document.getElementById('wishesCard');
            const variantRadios = document.getElementsByName('variant');

            // Réinitialiser le message d'erreur
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            // Validation
            if (!nameInput.value.trim()) {
                showError('Veuillez entrer un prénom');
                return;
            }

            if (!dateInput.value) {
                showError('Veuillez sélectionner une date d\'anniversaire');
                return;
            }

            const name = nameInput.value.trim();
            const selectedDate = new Date(dateInput.value);
            const today = new Date();

            if (selectedDate > today) {
                showError('Veuillez sélectionner une date valide');
                return;
            }

            // Récupérer la variante sélectionnée
            let selectedVariant = 'romantic';
            for (let radio of variantRadios) {
                if (radio.checked) {
                    selectedVariant = radio.value;
                    break;
                }
            }

            // Sélectionner un template aléatoire selon la variante
            const templates = wishVariants[selectedVariant];
            const randomIndex = Math.floor(Math.random() * templates.length);
            const message = templates[randomIndex].replace('{name}', name);

            // Afficher le message
            document.getElementById('wishesMessage').textContent = message;
            wishesCard.classList.add('show');

            // Stocker le message pour WhatsApp
            window.currentWish = message;

            // Scroll vers les vœux
            setTimeout(() => {
                wishesCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function sendViaWhatsApp() {
            if (!window.currentWish) {
                showError('Veuillez d\'abord générer un message');
                return;
            }

            const siteLink = '\n\n📱 Créé avec: hbd-web-ashy.vercel.app';
            const fullMessage = window.currentWish + siteLink;
            const message = encodeURIComponent(fullMessage);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        // Permettre l'appui sur Entrée pour générer les vœux
        document.getElementById('name').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateWishes();
            }
        });

        document.getElementById('birthDate').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateWishes();
            }
        });
    </script>
